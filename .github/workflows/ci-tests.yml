name: tests

# Runs the two test suites from docs/engineering/testing.md:
#   1. Core NUnit tests — plain dotnet, no Unity install, always run.
#   2. Unity EditMode tests — headless editor via game-ci/unity-test-runner.
#      Requires the UNITY_LICENSE secret (#71); until it is configured the
#      EditMode job emits a loud warning instead of silently passing.

on:
  pull_request:
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "CoreTests/**"
      - ".github/workflows/ci-tests.yml"
  push:
    branches:
      - main
    paths:
      - "Assets/**"
      - "Packages/**"
      - "ProjectSettings/**"
      - "CoreTests/**"
      - ".github/workflows/ci-tests.yml"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core NUnit tests (no Unity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run Core tests
        run: dotnet test CoreTests/Doggiehood.Core.Tests --logger "console;verbosity=normal"

  editmode-tests:
    name: Unity EditMode tests (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check for Unity license secret
        id: license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        run: |
          if [ -n "$UNITY_LICENSE" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=EditMode tests skipped::UNITY_LICENSE secret is not configured, so Unity EditMode tests did not run. Generate a Unity Personal activation file and add it as the UNITY_LICENSE repo secret (issue #71)."
          fi

      - name: Cache Unity Library
        if: steps.license.outputs.present == 'true'
        uses: actions/cache@v4
        with:
          path: Library
          key: unity-library-tests-${{ hashFiles('Packages/manifest.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            unity-library-tests-

      - name: Run EditMode tests
        if: steps.license.outputs.present == 'true'
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          testMode: editmode
          customParameters: -nographics

      - name: Upload test results
        if: always() && steps.license.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: editmode-test-results
          path: artifacts
