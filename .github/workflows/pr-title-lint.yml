name: pr-title-lint

# Lints every PR title against Conventional Commits (#82). release-please
# computes version bumps from squash-merged PR titles, so this check must be
# marked "required" in branch protection for the default branch (repo
# settings — cannot be configured from this file).

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  lint:
    name: Conventional Commits PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" in the PR title "{title}" must start
            lower-case, e.g. "feat: add dog wander behavior".
