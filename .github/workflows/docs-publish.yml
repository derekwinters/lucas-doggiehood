name: docs-publish

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements.txt"
      - "VERSION"
      - ".github/workflows/docs-publish.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read game version
        id: game_version
        # VERSION's first field is the bare semver; anything after it is the
        # "# x-release-please-version" marker comment release-please's
        # generic extra-files updater needs to find the line to rewrite (#114).
        run: echo "version=$(cut -d'#' -f1 VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"

      - name: Deploy versioned docs with mike
        run: |
          mike deploy --push --update-aliases "${{ steps.game_version.outputs.version }}" latest
          mike set-default --push latest
